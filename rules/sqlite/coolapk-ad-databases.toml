schema_version = 1
kind = "sqlite"

[[rules]]
id = "sqlite-coolapk-beizi-ad-delete"
category = "sqlite"
action = "delete"
schedule = "manual"
target_template = "/data/user/*/com.coolapk.market/databases/beizi_ad.db"
risk_level = "medium"
default_enabled = false
profile = "sqlite"
source = "ads288.zip"
source_file = "Example/ads288.zip"
zip_entry = "mod/coolapk.sh"
source_line_or_pattern = "L50-L52 sqlite_file includes /data/user/*/com.coolapk.market/databases/beizi_ad.db"
observed_behavior = "Coolapk may keep a BeiZi advertising database in its app-private databases directory."
rollback_strategy = "Before deleting, snapshot the original database path and metadata into the restore ledger. Restore the saved file if present; otherwise leave the path absent."
introduced_by = "T9"
reviewed_at = "2026-06-17"
notes = "Converted to manual delete to avoid forcing a persistent placeholder for this app-specific rule."

