[[rules]]
id = "netease-cloudmusic-external-ad-cache"
category = "file_path"
package = "com.netease.cloudmusic"
action = "empty_dir"
target_template = "/sdcard/Android/data/<pkg>/cache/Ad"
risk_level = "low"
default_enabled = true
profile = "conservative"
observed_behavior = "NetEase Cloud Music stores advertising assets in the package-owned external cache/Ad directory."
rollback_strategy = "restore_original"
introduced_by = "task-8"
reviewed_at = "2026-06-17"
notes = "Rollback detail: record original directory metadata before placeholder creation; remove the placeholder and restore ledger metadata when available."

[rules.source]
source = "Adguard-Home-For-Magisk-Mod"
source_file = "Example/Adguard-Home-For-Magisk-Mod/Adguardhome/scripts/NoAdsService.sh"
source_line_or_pattern = "line 38: block_ad \"/data/media/0/Android/data/com.netease.cloudmusic/cache/Ad\""

[[rules]]
id = "netease-cloudmusic-internal-musicwebapp"
category = "file_path"
package = "com.netease.cloudmusic"
action = "empty_dir"
target_template = "/data/data/<pkg>/cache/MusicWebApp"
risk_level = "medium"
default_enabled = false
profile = "conservative"
observed_behavior = "NetEase Cloud Music stores replaceable web app promotional cache under cache/MusicWebApp."
rollback_strategy = "restore_original"
introduced_by = "task-8"
reviewed_at = "2026-06-17"
notes = "Rollback detail: record original path metadata before placeholder creation; remove the placeholder and restore ledger metadata when available. Disabled by default because the directory name is broader than explicit ad cache."

[rules.source]
source = "Adguard-Home-For-Magisk-Mod"
source_file = "Example/Adguard-Home-For-Magisk-Mod/Adguardhome/scripts/NoAdsService.sh"
source_line_or_pattern = "line 39: block_ad \"/data/data/com.netease.cloudmusic/cache/MusicWebApp\""
