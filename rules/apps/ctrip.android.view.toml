[[rules]]
id = "ctrip-external-ctad-cache"
category = "file_path"
package = "ctrip.android.view"
action = "empty_dir"
target_template = "/sdcard/Android/data/<pkg>/cache/CTADCache"
risk_level = "low"
default_enabled = true
profile = "conservative"
observed_behavior = "Ctrip stores CTAD advertising cache below its external app cache directory."
rollback_strategy = "restore_original"
introduced_by = "task-8"
reviewed_at = "2026-06-17"
notes = "Rollback detail: record original directory metadata before placeholder creation; remove the placeholder and restore ledger metadata when available."

[rules.source]
source = "Adguard-Home-For-Magisk-Mod"
source_file = "Example/Adguard-Home-For-Magisk-Mod/Adguardhome/scripts/NoAdsService.sh"
source_line_or_pattern = "line 100: block_ad \"/data/media/0/Android/data/ctrip.android.view/cache/CTADCache\""

[[rules]]
id = "ctrip-internal-ctad-files"
category = "file_path"
package = "ctrip.android.view"
action = "empty_dir"
target_template = "/data/data/<pkg>/files/CTAD"
risk_level = "low"
default_enabled = true
profile = "conservative"
observed_behavior = "Ctrip stores CTAD advertising data below its app-private files directory."
rollback_strategy = "restore_original"
introduced_by = "task-8"
reviewed_at = "2026-06-17"
notes = "Rollback detail: record original directory metadata before placeholder creation; remove the placeholder and restore ledger metadata when available."

[rules.source]
source = "Adguard-Home-For-Magisk-Mod"
source_file = "Example/Adguard-Home-For-Magisk-Mod/Adguardhome/scripts/NoAdsService.sh"
source_line_or_pattern = "line 101: block_ad \"/data/data/ctrip.android.view/files/CTAD\""
