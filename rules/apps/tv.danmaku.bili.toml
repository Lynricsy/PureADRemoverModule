[[rules]]
id = "bili-files-res-cache"
category = "file_path"
package = "tv.danmaku.bili"
action = "empty_dir"
target_template = "/data/user/[0-9]*/<pkg>/files/res_cache"
risk_level = "medium"
default_enabled = true
profile = "conservative"
observed_behavior = "Bilibili resource cache contains replaceable launch and advertising assets."
rollback_strategy = "restore_original"
introduced_by = "task-8"
reviewed_at = "2026-06-17"
notes = "Rollback detail: record matched path metadata for each Android user before placeholder creation; remove placeholders and restore ledger metadata when available. Kept as medium risk because the cache may contain non-ad resources."

[rules.source]
source = "ads288.zip"
source_file = "Example/ads288.zip"
zip_entry = "mod/ad.sh"
source_line_or_pattern = "line 115: /data/user/[0-9]*/tv.danmaku.bili/files/res_cache"
