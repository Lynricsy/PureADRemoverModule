[[rules]]
id = "bili-files-splash2"
category = "file_path"
package = "tv.danmaku.bili"
action = "empty_dir"
target_template = "/data/data/<pkg>/files/splash2"
risk_level = "low"
default_enabled = true
profile = "conservative"
observed_behavior = "Bilibili stores launch splash assets under files/splash2."
rollback_strategy = "restore_original"
introduced_by = "task-8"
reviewed_at = "2026-06-17"
notes = "Rollback detail: record original path metadata before replacing the directory with an empty placeholder; remove the placeholder and restore ledger metadata when available. Source script locking is not imported."

[rules.source]
source = "Adguard-Home-For-Magisk-Mod"
source_file = "Example/Adguard-Home-For-Magisk-Mod/Adguardhome/scripts/NoAdsService.sh"
source_line_or_pattern = "line 25: block_ad \"/data/data/tv.danmaku.bili/files/splash2\""

