[[rules]]
id = "jiakao-sdk-gdtdownload-cache"
category = "sdk_cache"
package = "com.handsgo.jiakao.android"
action = "empty_dir"
target_template = "/data/user/[0-9]*/<pkg>/cache/GDTDOWNLOAD"
risk_level = "low"
default_enabled = true
profile = "sdk_cache"
observed_behavior = "Tencent ad SDK download cache directory appears in the app-private cache tree."
rollback_strategy = "restore_original"
introduced_by = "task-8"
reviewed_at = "2026-06-17"
notes = "Rollback detail: record original directory metadata before placeholder creation; remove the placeholder and restore ledger metadata when available. Converted as a package-scoped local cache rule only."

[rules.source]
source = "ads288.zip"
source_file = "Example/ads288.zip"
zip_entry = "mod/ad.sh"
source_line_or_pattern = "line 32: /data/user/[0-9]*/com.handsgo.jiakao.android/cache/GDTDOWNLOAD"

